<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <script type="module" src="https://unpkg.com/esp-web-tools@7.1.0/dist/web/install-button.js?module"></script>
    <style>
        body { font-family: sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        .release { display: flex; align-items: center; gap: 0.75rem; margin: 0.5rem 0; }
        .release .tag { font-weight: 600; min-width: 6rem; }
        .release .badge { font-size: 0.8em; padding: 0 0.4em; border-radius: 3px; background: #eee; color: #555; }
        .release .badge.prerelease { background: #fff3cd; color: #856404; }
        .release .badge.latest { background: #d4edda; color: #155724; }
        #releases .status { color: #666; font-style: italic; }
        #releases .error { color: #b00; }
        #repo-selector { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin: 1rem 0; }
        #repo-selector label { font-weight: 600; }
        #repo-custom { padding: 0.25rem 0.5rem; min-width: 18rem; }
        #repo-custom[hidden] { display: none; }
    </style>
</head>

<body>
    <p>
        Click the connect button next to a version to install it on your ESP device.
    </p>
    <p>
        If you don't see your ESP device in the list, you might need to install
        <a href="https://esphome.github.io/esp-web-tools/#drivers">the drivers</a>.
    </p>

    <div id="repo-selector">
        <label for="repo-select">Firmware source:</label>
        <select id="repo-select">
            <option value="radimklaska/Owie">radimklaska/Owie (default)</option>
            <option value="lolwheel/Owie">lolwheel/Owie</option>
            <option value="ow-breaker/Owie">ow-breaker/Owie</option>
            <option value="__custom__">Other…</option>
        </select>
        <input id="repo-custom" type="text" placeholder="owner/Repo" hidden />
    </div>

    <p>
        Releases of
        <a href="#" id="firmware-repo-link"></a>:
    </p>

    <div id="releases">
        <p class="status">Loading releases…</p>
    </div>

    <script>
        const PRESETS = ['radimklaska/Owie', 'lolwheel/Owie', 'ow-breaker/Owie'];
        const DEFAULT_REPO = 'radimklaska/Owie';

        const select = document.getElementById('repo-select');
        const customInput = document.getElementById('repo-custom');
        const repoLink = document.getElementById('firmware-repo-link');
        const container = document.getElementById('releases');

        function readInitialRepo() {
            const params = new URLSearchParams(location.search);
            const fromUrl = params.get('repo');
            return fromUrl || DEFAULT_REPO;
        }

        function applyRepoToControls(repo) {
            if (PRESETS.includes(repo)) {
                select.value = repo;
                customInput.hidden = true;
                customInput.value = '';
            } else {
                select.value = '__custom__';
                customInput.hidden = false;
                customInput.value = repo;
            }
        }

        function updateUrl(repo) {
            const url = new URL(location.href);
            if (repo === DEFAULT_REPO) {
                url.searchParams.delete('repo');
            } else {
                url.searchParams.set('repo', repo);
            }
            history.replaceState(null, '', url);
        }

        function isValidRepo(value) {
            return /^[\w.-]+\/[\w.-]+$/.test(value);
        }

        async function loadReleases(repo) {
            repoLink.href = `https://github.com/${repo}/releases`;
            repoLink.textContent = repo;
            container.innerHTML = '<p class="status">Loading releases…</p>';
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/releases`);
                if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
                const releases = await res.json();
                container.innerHTML = '';
                const usable = releases.filter(r => r.assets.some(a => a.name === 'firmware.bin'));
                if (!usable.length) {
                    container.innerHTML = '<p class="status">No releases with firmware.bin found.</p>';
                    return;
                }
                let latestSeen = false;
                for (const release of usable) {
                    const asset = release.assets.find(a => a.name === 'firmware.bin');
                    const manifest = {
                        name: `Owie ${release.tag_name}`,
                        version: release.tag_name,
                        builds: [{
                            chipFamily: 'ESP8266',
                            parts: [{ path: asset.browser_download_url, offset: 0 }]
                        }]
                    };
                    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                    const manifestUrl = URL.createObjectURL(blob);

                    const row = document.createElement('div');
                    row.className = 'release';

                    const tag = document.createElement('span');
                    tag.className = 'tag';
                    tag.textContent = release.tag_name;
                    row.appendChild(tag);

                    if (!release.prerelease && !latestSeen) {
                        const badge = document.createElement('span');
                        badge.className = 'badge latest';
                        badge.textContent = 'latest';
                        row.appendChild(badge);
                        latestSeen = true;
                    }
                    if (release.prerelease) {
                        const badge = document.createElement('span');
                        badge.className = 'badge prerelease';
                        badge.textContent = 'pre-release';
                        row.appendChild(badge);
                    }

                    const btn = document.createElement('esp-web-install-button');
                    btn.setAttribute('manifest', manifestUrl);
                    row.appendChild(btn);

                    container.appendChild(row);
                }
            } catch (err) {
                container.innerHTML = `<p class="error">Failed to load releases: ${err.message}</p>`;
            }
        }

        select.addEventListener('change', () => {
            if (select.value === '__custom__') {
                customInput.hidden = false;
                customInput.focus();
                return;
            }
            customInput.hidden = true;
            customInput.value = '';
            updateUrl(select.value);
            loadReleases(select.value);
        });

        function commitCustom() {
            const value = customInput.value.trim();
            if (!value) return;
            if (!isValidRepo(value)) {
                container.innerHTML = `<p class="error">"${value}" is not a valid owner/repo.</p>`;
                return;
            }
            updateUrl(value);
            loadReleases(value);
        }

        customInput.addEventListener('change', commitCustom);
        customInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                commitCustom();
            }
        });

        const initial = readInitialRepo();
        applyRepoToControls(initial);
        loadReleases(initial);
    </script>
</body>

</html>
